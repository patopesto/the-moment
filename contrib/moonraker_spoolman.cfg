# =============================================================================
# moonraker_spoolman.cfg
# =============================================================================
# Add these sections to your moonraker.conf on the Ender 3 V3 SE.
#
# Replace <SERVER-IP> with the IP address of the machine running Docker.
# Example: 192.168.1.100
#
# After adding this, restart Moonraker:
#   sudo systemctl restart moonraker
#
# Spoolman will then automatically track filament usage from every print
# started through Moonraker (OrcaSlicer, Fluidd, Mainsail, etc.)
# =============================================================================

[spoolman]
server: http://<SERVER-IP>:7912
# Sync interval in seconds — how often Moonraker pushes usage to Spoolman
sync_rate: 5

# =============================================================================
# Optional: enable Spoolman spool selection in Fluidd / Mainsail
# =============================================================================
# Nothing extra needed — Fluidd and Mainsail auto-detect Spoolman when
# the [spoolman] section is present in moonraker.conf.
#
# In your slicer (OrcaSlicer, Cura, PrusaSlicer), set the filament profile
# to include the Spoolman spool ID in the print start macro if you use one.
# =============================================================================

# =============================================================================
# Recommended: also enable update_manager so Moonraker stays current
# =============================================================================
[update_manager spoolman]
type: web
channel: stable
repo: Donkie/Spoolman
path: ~/spoolman
