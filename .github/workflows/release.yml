name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64

      - name: Build for Linux AMD64
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -o the-moment-linux-amd64 .
          chmod +x the-moment-linux-amd64

      - name: Build for Linux ARM64
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm64
          CC: aarch64-linux-gnu-gcc
        run: |
          go build -o the-moment-linux-arm64 .
          chmod +x the-moment-linux-arm64

      - name: Build for Windows AMD64
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -o the-moment-windows-amd64.exe .

      - name: Build for macOS AMD64
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -o the-moment-darwin-amd64 .
          chmod +x the-moment-darwin-amd64

      - name: Build for macOS ARM64
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -o the-moment-darwin-arm64 .
          chmod +x the-moment-darwin-arm64

      - name: Build OctoPrint plugin zip
        run: |
          cd octoprint-plugin && zip -r ../octoprint-the-moment.zip setup.py octoprint_the_moment/ \
            -x "octoprint_the_moment/__pycache__/*"

      - name: Create checksums
        run: |
          sha256sum the-moment-* octoprint-the-moment.zip > checksums.txt
          cat checksums.txt

      - name: Extract version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for release notes
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Extracting changelog for $VERSION from CHANGELOG.md"

          # Read the matching ## [vX.Y.Z] section from the hand-written CHANGELOG.md.
          # Stops at the next ## [ header so only this version's notes are captured.
          CHANGELOG=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)

          # Trim trailing blank lines
          CHANGELOG=$(printf '%s' "$CHANGELOG" | sed 's/[[:space:]]*$//')

          if [ -z "$CHANGELOG" ]; then
            echo "WARNING: No section found for $VERSION in CHANGELOG.md"
            CHANGELOG="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes."
          fi

          echo "Extracted:"
          printf '%s\n' "$CHANGELOG"

          DELIM="__CHANGELOG_END__"
          {
            echo "CHANGELOG<<${DELIM}"
            printf '%s' "$CHANGELOG"
            printf '\n%s\n' "${DELIM}"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            the-moment-linux-amd64
            the-moment-linux-arm64
            the-moment-windows-amd64.exe
            the-moment-darwin-amd64
            the-moment-darwin-arm64
            octoprint-the-moment.zip
            checksums.txt
          body: |
            # The Moment ${{ steps.get_version.outputs.VERSION }}
            
            ## Installation
            
            Download the appropriate binary for your platform:
            
            - **Linux (AMD64)**: `the-moment-linux-amd64`
            - **Linux (ARM64)**: `the-moment-linux-arm64` (Raspberry Pi, etc.)
            - **Windows (AMD64)**: `the-moment-windows-amd64.exe`
            - **macOS (Intel)**: `the-moment-darwin-amd64`
            - **macOS (Apple Silicon)**: `the-moment-darwin-arm64`
            
            ### Quick Start
            
            1. Download the binary for your platform
            2. Make it executable (Linux/macOS): `chmod +x the-moment-*`
            3. Run Spoolman: `docker run -d --name spoolman -p 8000:8000 ghcr.io/donkie/spoolman:latest`
            4. Start The Moment: `./the-moment-*`
            5. Open http://localhost:5000 and configure your printers
            
            ## Verify Downloads
            
            Verify your download using the checksums:
            ```bash
            sha256sum -c checksums.txt
            ```
            
            ## What's New
            ${{ steps.changelog.outputs.CHANGELOG }}
            
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

